<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universe Phase 1 - Data Structure Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #0f1118;
      color: #e0e6ed;
    }
    h1 { color: #3b82f6; margin-bottom: 10px; }
    h2 { color: #8b91a4; font-size: 16px; margin-top: 30px; }
    .test { 
      background: #181c28; 
      padding: 15px; 
      margin: 10px 0; 
      border-radius: 6px;
      border-left: 3px solid #3b82f6;
    }
    .test.pass { border-left-color: #10b981; }
    .test.fail { border-left-color: #ef5a6a; }
    .test-title { font-weight: bold; margin-bottom: 8px; }
    .test-result { color: #10b981; font-size: 13px; }
    .test-error { color: #ef5a6a; font-size: 13px; }
    code { 
      background: #0f1118; 
      padding: 2px 6px; 
      border-radius: 3px;
      font-size: 12px;
    }
    pre { 
      background: #0f1118; 
      padding: 12px; 
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      color: #9fe07b;
    }
    .loading { color: #ffd43b; }
  </style>
</head>
<body>
  <h1>🌍 Universe Feature - Phase 1 Test</h1>
  <p style="color: #8b91a4; margin-bottom: 30px;">
    Testing core universe data structure without UI modifications
  </p>

  <div id="results"></div>

  <!-- Load data.jsx -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="data.jsx" type="text/babel"></script>

  <script type="text/babel">
    const resultsDiv = document.getElementById('results');
    let testsPassed = 0;
    let testsFailed = 0;

    function addTest(title, passed, details = '', error = '') {
      testsPassed += passed ? 1 : 0;
      testsFailed += passed ? 0 : 1;
      
      const div = document.createElement('div');
      div.className = `test ${passed ? 'pass' : 'fail'}`;
      div.innerHTML = `
        <div class="test-title">${passed ? '✓' : '✗'} ${title}</div>
        ${details ? `<div class="test-result">${details}</div>` : ''}
        ${error ? `<div class="test-error">${error}</div>` : ''}
      `;
      resultsDiv.appendChild(div);
    }

    function runTests() {
      try {
        // Test 1: DEFAULT_UNIVERSE exists
        try {
          if (window.DEFAULT_UNIVERSE && 
              window.DEFAULT_UNIVERSE.id === 'main' && 
              window.DEFAULT_UNIVERSE.name === 'Основная') {
            addTest('DEFAULT_UNIVERSE structure', true, 
              `ID: <code>${window.DEFAULT_UNIVERSE.id}</code>, Name: <code>${window.DEFAULT_UNIVERSE.name}</code>`);
          } else {
            addTest('DEFAULT_UNIVERSE structure', false, '', 'DEFAULT_UNIVERSE has incorrect structure');
          }
        } catch (e) {
          addTest('DEFAULT_UNIVERSE structure', false, '', e.message);
        }

        // Test 2: UNIVERSE_META array exists
        try {
          if (Array.isArray(window.UNIVERSE_META) && window.UNIVERSE_META.length >= 1) {
            addTest('UNIVERSE_META array', true, 
              `Contains <code>${window.UNIVERSE_META.length}</code> universe(s)`);
          } else {
            addTest('UNIVERSE_META array', false, '', 'UNIVERSE_META is not an array or is empty');
          }
        } catch (e) {
          addTest('UNIVERSE_META array', false, '', e.message);
        }

        // Test 3: UNIVERSE_MAP exists
        try {
          if (window.UNIVERSE_MAP && window.UNIVERSE_MAP['main']) {
            addTest('UNIVERSE_MAP lookup', true, 
              `Can lookup universe by ID: <code>${JSON.stringify(window.UNIVERSE_MAP['main'])}</code>`);
          } else {
            addTest('UNIVERSE_MAP lookup', false, '', 'UNIVERSE_MAP missing or cannot lookup main universe');
          }
        } catch (e) {
          addTest('UNIVERSE_MAP lookup', false, '', e.message);
        }

        // Test 4: getUniverseId helper
        try {
          const testItem1 = { id: 'test1', name: 'Test' };
          const testItem2 = { id: 'test2', name: 'Test2', universe: 'alt-history' };
          
          const u1 = window.getUniverseId(testItem1);
          const u2 = window.getUniverseId(testItem2);
          
          if (u1 === 'main' && u2 === 'alt-history') {
            addTest('getUniverseId helper', true, 
              `Item without universe → <code>${u1}</code>, Item with universe → <code>${u2}</code>`);
          } else {
            addTest('getUniverseId helper', false, '', 
              `Expected 'main' and 'alt-history', got '${u1}' and '${u2}'`);
          }
        } catch (e) {
          addTest('getUniverseId helper', false, '', e.message);
        }

        // Test 5: setUniverseId helper
        try {
          const item = { id: 'test', name: 'Test' };
          const newItem = window.setUniverseId(item, 'fiction');
          
          if (newItem.universe === 'fiction' && item.universe === undefined) {
            addTest('setUniverseId helper', true, 
              `Original item unchanged, new item has universe: <code>${newItem.universe}</code>`);
          } else {
            addTest('setUniverseId helper', false, '', 'setUniverseId did not work correctly');
          }
        } catch (e) {
          addTest('setUniverseId helper', false, '', e.message);
        }

        // Test 6: isInUniverse helper
        try {
          const item1 = { id: 'test1', universe: 'main' };
          const item2 = { id: 'test2', universe: 'alt-history' };
          
          const r1 = window.isInUniverse(item1, 'main');
          const r2 = window.isInUniverse(item2, 'main');
          const r3 = window.isInUniverse(item1, 'alt-history');
          
          if (r1 === true && r2 === false && r3 === false) {
            addTest('isInUniverse helper', true, 
              `Correctly identifies universe membership`);
          } else {
            addTest('isInUniverse helper', false, '', 
              `Expected true,false,false got ${r1},${r2},${r3}`);
          }
        } catch (e) {
          addTest('isInUniverse helper', false, '', e.message);
        }

        // Test 7: filterByUniverse helper - main universe
        try {
          const items = [
            { id: '1', universe: 'main' },
            { id: '2', universe: 'main' },
            { id: '3', universe: 'alt-history' }
          ];
          
          const filtered = window.filterByUniverse(items, 'main');
          
          if (filtered.length === 3) {
            addTest('filterByUniverse (main)', true, 
              `Returns all items for main universe (backward compatibility): <code>${filtered.length}</code> items`);
          } else {
            addTest('filterByUniverse (main)', false, '', 
              `Expected 3 items, got ${filtered.length}`);
          }
        } catch (e) {
          addTest('filterByUniverse (main)', false, '', e.message);
        }

        // Test 8: filterByUniverse helper - specific universe
        try {
          const items = [
            { id: '1', universe: 'main' },
            { id: '2', universe: 'alt-history' },
            { id: '3', universe: 'alt-history' },
            { id: '4', universe: 'fiction' }
          ];
          
          const filtered = window.filterByUniverse(items, 'alt-history');
          
          if (filtered.length === 2 && filtered.every(i => i.universe === 'alt-history')) {
            addTest('filterByUniverse (specific)', true, 
              `Correctly filters by universe: <code>${filtered.length}</code> items`);
          } else {
            addTest('filterByUniverse (specific)', false, '', 
              `Expected 2 alt-history items, got ${filtered.length}`);
          }
        } catch (e) {
          addTest('filterByUniverse (specific)', false, '', e.message);
        }

        // Test 9: ALL_ITEMS backward compatibility
        try {
          if (Array.isArray(window.ALL_ITEMS) && window.ALL_ITEMS.length > 0) {
            // Check that existing items don't have universe field (backward compatibility)
            const itemsWithUniverse = window.ALL_ITEMS.filter(i => i.universe);
            const itemsWithoutUniverse = window.ALL_ITEMS.filter(i => !i.universe);
            
            addTest('ALL_ITEMS backward compatibility', true, 
              `Total: <code>${window.ALL_ITEMS.length}</code> items, ` +
              `Without universe field: <code>${itemsWithoutUniverse.length}</code> ` +
              `(will default to 'main')`);
          } else {
            addTest('ALL_ITEMS backward compatibility', false, '', 'ALL_ITEMS is empty or not an array');
          }
        } catch (e) {
          addTest('ALL_ITEMS backward compatibility', false, '', e.message);
        }

        // Test 10: Existing helpers still work
        try {
          const testItem = window.ALL_ITEMS[0];
          const range = window.itemRange(testItem);
          const label = window.itemLabel(testItem);
          const color = window.colorForItem(testItem);
          
          if (range && label && color) {
            addTest('Existing helpers compatibility', true, 
              `itemRange, itemLabel, colorForItem all work correctly`);
          } else {
            addTest('Existing helpers compatibility', false, '', 'Some helpers returned null/undefined');
          }
        } catch (e) {
          addTest('Existing helpers compatibility', false, '', e.message);
        }

        // Summary
        const summary = document.createElement('div');
        summary.style.cssText = 'margin-top: 30px; padding: 20px; background: #181c28; border-radius: 6px;';
        summary.innerHTML = `
          <h2 style="margin: 0 0 10px; color: ${testsFailed === 0 ? '#10b981' : '#ef5a6a'}">
            ${testsFailed === 0 ? '✓ All tests passed!' : `✗ ${testsFailed} test(s) failed`}
          </h2>
          <div style="color: #8b91a4; font-size: 14px;">
            Passed: <code style="color: #10b981;">${testsPassed}</code> / 
            Failed: <code style="color: ${testsFailed === 0 ? '#10b981' : '#ef5a6a'};">${testsFailed}</code>
          </div>
          ${testsFailed === 0 ? `
            <div style="margin-top: 15px; padding: 12px; background: #10b98120; border-radius: 4px; color: #10b981; font-size: 13px;">
              <strong>Phase 1 Complete!</strong> Core universe data structure is ready.
              <br/>Next step: Phase 2 - Basic Universe Selection UI
            </div>
          ` : ''}
        `;
        resultsDiv.appendChild(summary);

      } catch (e) {
        addTest('Test Suite', false, '', `Critical error: ${e.message}`);
      }
    }

    // Wait for data to load then run tests
    setTimeout(() => {
      if (window.DEFAULT_UNIVERSE && window.ALL_ITEMS) {
        runTests();
      } else {
        resultsDiv.innerHTML = '<div class="test fail"><div class="test-error">Data not loaded yet. Refresh the page.</div></div>';
      }
    }, 500);
  </script>
</body>
</html>
