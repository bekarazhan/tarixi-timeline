<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TarixiTimeline · концепт: универсальные теги</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fragment+Mono:wght@400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07080c;
    --bg-1: #0c0e15;
    --bg-2: #11141d;
    --bg-3: #181c28;
    --bg-4: #232838;
    --line: #232838;
    --line-strong: #2e3447;
    --text-0: #f5f6fa;
    --text-1: #c6cad8;
    --text-2: #8b91a4;
    --text-3: #5e6478;
    --accent: #f0e9d8;

    --c-era:      #f7903a;
    --c-state:    #38bdf8;
    --c-ruler:    #e6b94a;
    --c-thinker:  #5cd4ec;
    --c-art:      #b27cff;
    --c-battle:   #ef5a6a;
    --c-event:    #5fd49a;

    --font-ui: 'Manrope', system-ui, sans-serif;
    --font-mono: 'Fragment Mono', ui-monospace, monospace;
    --font-disp: 'Instrument Serif', serif;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: var(--font-ui); }
  body { -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }

  /* ===== shared mini design language for all artboards ===== */
  .art {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: var(--font-ui);
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }
  .art-pad { padding: 22px; }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-3);
  }
  .label {
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-3);
  }
  .h-disp {
    font-family: var(--font-disp);
    font-style: italic;
    font-weight: 400;
    color: var(--text-0);
  }

  /* ===== tag chip (the central new primitive) ===== */
  .tag {
    --c: var(--text-2);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 6px;
    border-radius: 999px;
    background: color-mix(in oklab, var(--c) 14%, var(--bg-2));
    border: 1px solid color-mix(in oklab, var(--c) 35%, transparent);
    font-size: 11.5px;
    color: color-mix(in oklab, var(--c) 25%, var(--text-0));
    font-weight: 500;
    line-height: 1;
    white-space: nowrap;
  }
  .tag .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--c);
    box-shadow: 0 0 6px color-mix(in oklab, var(--c) 70%, transparent);
    flex-shrink: 0;
  }
  .tag .x {
    margin-left: 2px; opacity: 0.5; cursor: pointer;
    font-size: 10px; padding: 0 2px;
  }
  .tag.facet-place { font-style: italic; }
  .tag.primary {
    background: color-mix(in oklab, var(--c) 28%, var(--bg-2));
    border-color: color-mix(in oklab, var(--c) 70%, transparent);
    color: var(--text-0);
    box-shadow: 0 0 0 1px color-mix(in oklab, var(--c) 30%, transparent);
  }
  .tag.primary .pin {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-0);
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--c) 50%, transparent);
    margin-left: 4px;
  }
  .tag-faceted {
    display: inline-flex; align-items: center; gap: 0;
    border-radius: 999px;
    border: 1px solid color-mix(in oklab, var(--c) 35%, transparent);
    background: color-mix(in oklab, var(--c) 14%, var(--bg-2));
    font-size: 11px;
    overflow: hidden;
  }
  .tag-faceted .facet {
    font-family: var(--font-mono);
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: color-mix(in oklab, var(--c) 40%, var(--text-2));
    padding: 3px 7px;
    background: color-mix(in oklab, var(--c) 8%, var(--bg-1));
    border-right: 1px solid color-mix(in oklab, var(--c) 25%, transparent);
  }
  .tag-faceted .name {
    padding: 3px 9px;
    color: color-mix(in oklab, var(--c) 25%, var(--text-0));
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tag-faceted .name .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--c);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx?v=1"></script>
<script type="text/babel" src="концепт-теги.jsx?v=1"></script>
</body>
</html>
